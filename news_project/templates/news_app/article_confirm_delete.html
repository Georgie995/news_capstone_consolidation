{% extends "base.html" %}
{% block title %}Delete article · News Application{% endblock %}

{% block content %}
<h1>Delete article</h1>
<p class="muted">
    You are about to permanently remove the article "<strong>{{ article.title }}</strong>".
    This action cannot be undone.
</p>

<form method="post">
    {% csrf_token %}
    <div class="btn-row">
        <button type="submit" class="btn-danger">Yes, delete</button>
        <a href="{% url 'article_detail' article.pk %}" class="btn-ghost">Cancel</a>
    </div>
</form>
{% endblock %}
